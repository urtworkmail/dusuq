upstream django_backend {
    server backend:8000;
}

upstream react_frontend {
    server frontend:80;
}

# ─────────────────────────────────────────────────────────────────────────────
# dusuq.com / www.dusuq.com — marketing site (static)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name dusuq.com www.dusuq.com;
    return 301 https://dusuq.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dusuq.com www.dusuq.com;

    ssl_certificate /etc/letsencrypt/live/dusuq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dusuq.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # Redirect www → apex
    if ($host = www.dusuq.com) {
        return 301 https://dusuq.com$request_uri;
    }

    root /var/www/marketing;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# erp.dusuq.com — the app (React frontend + Django API)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name erp.dusuq.com;
    return 301 https://erp.dusuq.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name erp.dusuq.com;

    ssl_certificate /etc/letsencrypt/live/dusuq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dusuq.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 20M;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    location /static/ {
        alias /var/www/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/media/;
        expires 7d;
    }

    location /api/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    location /django-admin/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://react_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
