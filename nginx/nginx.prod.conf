# proxy_pass targets use variables + Docker's embedded DNS resolver (127.0.0.11)
# instead of a static `upstream {}` block. A static upstream resolves the
# hostname once at nginx startup and caches that IP indefinitely — when
# backend/frontend get recreated (a new build, `up -d --build`) their internal
# IP changes, and nginx keeps proxying to the now-dead old IP until nginx
# itself restarts, i.e. random 502s after every deploy. The variable form
# re-resolves per the resolver's TTL, so container recreations are picked up
# automatically.

# ─────────────────────────────────────────────────────────────────────────────
# dusuq.com / www.dusuq.com — marketing site (static)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name dusuq.com www.dusuq.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://dusuq.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name dusuq.com www.dusuq.com;

    ssl_certificate /etc/letsencrypt/live/dusuq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dusuq.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Redirect www → apex
    if ($host = www.dusuq.com) {
        return 301 https://dusuq.com$request_uri;
    }

    root /var/www/marketing;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# app.dusuq.com — the app (React frontend + Django API)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name app.dusuq.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://app.dusuq.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name app.dusuq.com;

    ssl_certificate /etc/letsencrypt/live/dusuq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dusuq.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    resolver 127.0.0.11 valid=10s;
    client_max_body_size 20M;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    location /static/ {
        alias /var/www/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/media/;
        expires 7d;
    }

    location /api/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    location /django-admin/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        set $frontend_upstream http://frontend:80;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# Bare IP access (136.114.190.8) — no Host header matches dusuq.com or
# app.dusuq.com, so this is the fallback. Serves the app directly.
#
# HTTPS here will show a certificate name-mismatch warning in the browser —
# Let's Encrypt can't issue a cert for a bare IP, so this reuses the dusuq.com
# cert just to have TLS available at all (Django redirects HTTP → HTTPS in
# production, so a 443 listener is needed here or that redirect has nowhere
# to go). Click through the warning; it's expected for direct-IP access.
#
# To reach the marketing site by IP instead of the app, add a temporary
# hosts-file entry mapping dusuq.com to this IP — that preserves the Host
# header nginx needs to route to the right server block.
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name 136.114.190.8 _;

    resolver 127.0.0.11 valid=10s;
    client_max_body_size 20M;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    location /static/ {
        alias /var/www/static/;
    }

    location /media/ {
        alias /var/www/media/;
    }

    location /api/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /django-admin/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        set $frontend_upstream http://frontend:80;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

