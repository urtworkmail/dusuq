# Temporary HTTP-only config — use this before DNS/a TLS cert exist.
# Same routing as nginx.prod.conf (dusuq.com → marketing, erp.dusuq.com → app,
# bare IP → app) but plain HTTP only, no certificate dependency at all.
#
# Switch to this by setting NGINX_CONF=nginx.no-ssl.conf in .env, and
# USE_HTTPS=False so Django doesn't redirect-loop trying to force HTTPS.
# Switch back to nginx.prod.conf + USE_HTTPS=True once DNS points here and
# you've run certbot (see VPS_DEPLOYMENT.md).

upstream django_backend {
    server backend:8000;
}

upstream react_frontend {
    server frontend:80;
}

# ─────────────────────────────────────────────────────────────────────────────
# dusuq.com / www.dusuq.com — marketing site (static)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name dusuq.com www.dusuq.com;

    root /var/www/marketing;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# erp.dusuq.com — the app (React frontend + Django API)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name erp.dusuq.com;

    client_max_body_size 20M;

    location /static/ {
        alias /var/www/static/;
    }

    location /media/ {
        alias /var/www/media/;
    }

    location /api/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /django-admin/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://react_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# Bare IP access (24.144.103.213) and anything else — serves the app directly.
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name 24.144.103.213 _;

    client_max_body_size 20M;

    location /static/ {
        alias /var/www/static/;
    }

    location /media/ {
        alias /var/www/media/;
    }

    location /api/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /django-admin/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://react_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
