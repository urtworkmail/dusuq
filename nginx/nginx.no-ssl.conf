# Temporary HTTP-only config — use this before DNS/a TLS cert exist.
# Same routing as nginx.prod.conf (dusuq.com → marketing, app.dusuq.com → app,
# bare IP → app) but plain HTTP only, no certificate dependency at all.
#
# Switch to this by setting NGINX_CONF=nginx.no-ssl.conf in .env, and
# USE_HTTPS=False so Django doesn't redirect-loop trying to force HTTPS.
# Switch back to nginx.prod.conf + USE_HTTPS=True once DNS points here and
# you've run certbot (see VPS_DEPLOYMENT.md).
#
# proxy_pass targets use variables + Docker's embedded DNS resolver (127.0.0.11)
# instead of a static `upstream {}` block. A static upstream resolves the
# hostname once at nginx startup and caches that IP indefinitely — when
# backend/frontend get recreated (a new build, `up -d --build`) their internal
# IP changes, and nginx keeps proxying to the now-dead old IP until nginx
# itself restarts, i.e. random 502s after every deploy. The variable form
# re-resolves per the resolver's TTL, so container recreations are picked up
# automatically.

# ─────────────────────────────────────────────────────────────────────────────
# dusuq.com / www.dusuq.com — marketing site (static)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name dusuq.com www.dusuq.com;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    root /var/www/marketing;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# app.dusuq.com — the app (React frontend + Django API)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name app.dusuq.com;

    resolver 127.0.0.11 valid=10s;
    client_max_body_size 20M;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /static/ {
        alias /var/www/static/;
    }

    location /media/ {
        alias /var/www/media/;
    }

    location /api/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /django-admin/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        set $frontend_upstream http://frontend:80;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# Bare IP access (136.114.190.8) and anything else — serves the app directly.
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name 136.114.190.8 _;

    resolver 127.0.0.11 valid=10s;
    client_max_body_size 20M;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    location /static/ {
        alias /var/www/static/;
    }

    location /media/ {
        alias /var/www/media/;
    }

    location /api/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /django-admin/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        set $frontend_upstream http://frontend:80;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
