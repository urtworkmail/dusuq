version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: dusuq_erp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dairycare
      POSTGRES_USER: dairycare
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dairycare_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    # No ports here — published only in docker-compose.override.yml (dev).
    # See that file's comment for why this must not be done here.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dairycare"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dusuq_erp_redis
    restart: unless-stopped
    # No ports here — see docker-compose.override.yml.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dusuq_erp_backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - SERVICE_NAME=backend
    volumes:
      - ./backend:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    # No ports here — see docker-compose.override.yml.
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python manage.py runserver 0.0.0.0:8000

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dusuq_erp_celery
    restart: unless-stopped
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - SERVICE_NAME=celery
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker -l info -c 4

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dusuq_erp_celery_beat
    restart: unless-stopped
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - SERVICE_NAME=celery_beat
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: dusuq_erp_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # No ports here — see docker-compose.override.yml.
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  nginx:
    image: nginx:1.25-alpine
    container_name: dusuq_erp_nginx
    restart: unless-stopped
    # No ports here — see docker-compose.override.yml (dev) / docker-compose.prod.yml (prod).
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf
      - static_files:/var/www/static
      - media_files:/var/www/media
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  static_files:
  media_files: