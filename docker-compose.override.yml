# Auto-loaded by `docker compose up` whenever no explicit -f flags are given —
# this is what makes plain `docker compose up --build` work for local dev with
# services reachable on localhost (DB client, hitting the API directly, etc).
#
# The moment ANY -f flag is passed explicitly (as production always does:
# `docker compose -f docker-compose.yml -f docker-compose.prod.yml up`), Compose
# stops auto-loading this file — so these dev-only published ports can never
# leak into production. Do not rename or reference this file with -f in any
# production command.

services:
  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  backend:
    ports:
      - "8000:8000"

  frontend:
    ports:
      - "5173:5173"

  nginx:
    ports:
      - "8084:80"
