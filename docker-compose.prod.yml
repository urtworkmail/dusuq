version: "3.9"

# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Passing explicit -f flags (as above) makes Compose skip auto-loading
# docker-compose.override.yml — so none of that file's dev-only published
# ports (db/redis/backend/frontend directly on the host) apply here. Only
# nginx's ports below are ever published in production.

services:
  db:
    restart: always

  redis:
    restart: always

  backend:
    restart: always
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"

  celery:
    restart: always
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production

  celery_beat:
    restart: always
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Relative by default — frontend and API are always same-origin behind
        # nginx here, whether that origin is a domain or a bare IP. Only override
        # if the frontend is ever served from a different host than the API.
        VITE_API_URL: ${VITE_API_URL:-}
    volumes: []  # prod image is self-contained (dist baked in); no dev bind-mounts

  nginx:
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # NGINX_CONF: nginx.prod.conf (default, needs a real cert — see
      # VPS_DEPLOYMENT.md) or nginx.no-ssl.conf (plain HTTP, no cert/DNS needed —
      # see nginx/nginx.no-ssl.conf). Set in .env.
      - ./nginx/${NGINX_CONF:-nginx.prod.conf}:/etc/nginx/conf.d/default.conf
      - ./marketing:/var/www/marketing:ro
      - static_files:/var/www/static
      - media_files:/var/www/media
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # certbot's webroot authenticator drops ACME challenge files here; nginx
      # serves them straight off disk via the /.well-known/acme-challenge/
      # location in every port-80 server block. This lets certbot renew
      # without ever needing to stop nginx (unlike --standalone, which needs
      # port 80 free and can't coexist with an always-running nginx).
      - ./certbot-webroot:/var/www/certbot:ro
